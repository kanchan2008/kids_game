<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tick Tock Time Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-card" aria-labelledby="game-title">
    <section class="hero">
      <span class="mascot" aria-hidden="true">TIME</span>
      <div>
        <p class="eyebrow">Time practice for kids</p>
        <h1 id="game-title">Tick Tock Time Game</h1>
        <p class="subtitle">Read the analog clock, pick the matching time, and collect happy points!</p>
      </div>
    </section>

    <section class="score-row" aria-label="Game score">
      <div class="score-pill correct-score">
        <span aria-hidden="true">Star</span>
        <span>Correct: <strong id="correct-count">0</strong></span>
      </div>
      <div class="score-pill wrong-score">
        <span aria-hidden="true">Oops</span>
        <span>Try Again: <strong id="wrong-count">0</strong></span>
      </div>
      <button id="new-question" class="secondary-button" type="button">New Clock</button>
    </section>

    <section class="question-box" aria-label="Clock question">
      <p class="instruction">What time does the clock show?</p>

      <div class="clock-wrap" aria-live="polite">
        <div class="clock" role="img" aria-label="Analog clock showing a random time">
          <span class="number number-12">12</span>
          <span class="number number-1">1</span>
          <span class="number number-2">2</span>
          <span class="number number-3">3</span>
          <span class="number number-4">4</span>
          <span class="number number-5">5</span>
          <span class="number number-6">6</span>
          <span class="number number-7">7</span>
          <span class="number number-8">8</span>
          <span class="number number-9">9</span>
          <span class="number number-10">10</span>
          <span class="number number-11">11</span>
          <span id="hour-hand" class="hand hour-hand"></span>
          <span id="minute-hand" class="hand minute-hand"></span>
          <span class="center-dot"></span>
        </div>
      </div>

      <div id="choices" class="choices" aria-label="Answer choices"></div>
    </section>

    <p id="feedback" class="feedback" aria-live="assertive">Ready? Pick the time you see!</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
